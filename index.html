<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Factory Frontier TD</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="hud">
    <h1>Factory Frontier TD</h1>
    <div class="stats">
      <span id="wave">Wave: 1</span>
      <span id="credits">Credits: 120</span>
      <span id="core">Core HP: 20</span>
    </div>
    <p>Click build slots to place turrets. Press <kbd>N</kbd> to start next wave.</p>
  </div>
  <canvas id="game" width="1024" height="640"></canvas>
  <script src="game.js"></script>
</body>
</html>
